<!doctype html>
<html lang="zh">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport"
		content="width=device-width, initial-scale=1.0" />
	<title>Success</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/gardevoir" />
	<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
	<style>
		body {
			font-family:
				system-ui,
				-apple-system,
				sans-serif;
			background-color: #f3f4f6;
			display: grid;
			place-items: center;
			min-height: 100vh;
			margin: 0;
		}

		.card {
			display: grid;
			gap: 1rem;
			background: white;
			padding: 2.5rem 2rem;
			border-radius: 12px;
			box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
			width: 100%;
			max-width: 960px;
			text-align: center;
			box-sizing: border-box;
		}

		h1 {
			color: #059669;
			margin: 0;
			font-size: 1.75rem;
		}

		p {
			color: #4b5563;
			margin: 0;
		}

		.worker-id {
			display: grid;
			grid-template-columns: auto 1fr;
			gap: 0.75rem;
			align-items: center;
			justify-self: center;
			color: #4b5563;
			font-size: 0.95rem;
			max-width: 100%;
		}

		.worker-id-value {
			background-color: #f1f5f9;
			border: 1px solid #cbd5e1;
			border-radius: 6px;
			color: #0f172a;
			font-family:
				ui-monospace,
				SFMono-Regular,
				Menlo,
				Monaco,
				Consolas,
				monospace;
			font-size: 1rem;
			font-weight: 600;
			min-width: 0;
			padding: 0.35rem 0.6rem;
			word-break: break-word;
		}

		.comment-box {
			background-color: #f8fafc;
			border: 1px solid #e2e8f0;
			padding: 1.25rem;
			border-radius: 8px;
			font-family: monospace;
			font-size: 1.1rem;
			color: #0f172a;
			margin: 0;
			word-wrap: break-word;
			min-width: 0;
		}

		.copy-container {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 0.5rem;
			align-items: center;
			text-align: left;
		}

		.copy-btn {
			background: none;
			border: none;
			cursor: pointer;
			padding: 0.5rem;
			border-radius: 6px;
			color: #64748b;
			display: inline-grid;
			place-items: center;
		}

		.copy-btn:hover {
			background-color: #e2e8f0;
			color: #0f172a;
		}

		.section-label {
			text-align: left;
			font-size: 0.875rem;
			color: #64748b;
			font-weight: 600;
			margin-bottom: -0.5rem;
		}

		.title-section {
			display: grid;
			gap: 1rem;
		}

		.title-section[data-has-title="false"] {
			display: none;
		}

		.url-section {
			display: grid;
			gap: 0.5rem;
		}

		.url-section[data-has-url="false"] {
			display: none;
		}

		.url-link {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 0.75rem;
			align-items: center;
			background-color: #eff6ff;
			border: 1px solid #bfdbfe;
			border-radius: 8px;
			color: #1d4ed8;
			font-size: 0.95rem;
			padding: 1rem;
			text-align: left;
			text-decoration: none;
			word-break: break-word;
			overflow-wrap: anywhere;
		}

		.url-link:hover {
			background-color: #dbeafe;
			text-decoration: none;
		}

		a.back-btn {
			display: inline-grid;
			justify-self: center;
			color: #2563eb;
			text-decoration: none;
			font-weight: 500;
		}

		a.back-btn:hover {
			text-decoration: underline;
		}

		.text-success {
			color: #059669;
		}

		@media (min-width: 768px) {
			body {
				padding: 1.5rem;
				box-sizing: border-box;
			}
		}

		@media (max-width: 480px) {
			.worker-id {
				grid-template-columns: 1fr;
				gap: 0.4rem;
			}
		}
	</style>
</head>

<body>
	<div class="card">
		<h1>🎉 Claimed Successfully</h1>
		<div class="worker-id">
			<span>Your Worker ID</span>
			<span class="worker-id-value">{{WORKER_ID}}</span>
		</div>

		<div class="url-section"
			data-has-url="{{HAS_URL}}">
			<div class="section-label">Target URL</div>
			<a class="url-link" href="{{URL}}" target="_blank"
				rel="noopener noreferrer">
				<span>{{URL}}</span>
				<i class="fa-solid fa-arrow-up-right-from-square"></i>
			</a>
		</div>

		<p>
			Please copy your exclusive content below:
		</p>

		<div class="title-section"
			data-has-title="{{HAS_TITLE}}">
			<div class="section-label">Title</div>
			<div class="copy-container">
				<div class="comment-box" id="title-text">
					{{TITLE}}
				</div>
				<button class="copy-btn"
					data-copy-target="#title-text"
					aria-label="Copy Title">
					<i class="fa-regular fa-copy"></i>
				</button>
			</div>
		</div>

		<div class="section-label">Content</div>
		<div class="copy-container">
			<div class="comment-box" id="content-text">
				{{COMMENT}}
			</div>
			<button class="copy-btn"
				data-copy-target="#content-text"
				aria-label="Copy Content">
				<i class="fa-regular fa-copy"></i>
			</button>
		</div>

		<a href="/?job_id={{JOB_ID}}" class="back-btn">←
			Back to Home</a>
	</div>

	<script>
		document.querySelectorAll('.copy-btn').forEach(btn => {
			btn.addEventListener('click', async () => {
				const targetSelector = btn.getAttribute('data-copy-target')
				const targetEl = document.querySelector(targetSelector)
				if (targetEl) {
					try {
						await navigator.clipboard.writeText(targetEl.textContent.trim())
						const originalHtml = btn.innerHTML
						// Success checkmark SVG
						btn.innerHTML = '<i class="fa-solid fa-check text-success"></i>'
						setTimeout(() => {
							btn.innerHTML = originalHtml
						}, 2000)
					} catch (err) {
						console.error('Failed to copy', err)
					}
				}
			})
		});
	</script>
</body>

</html>

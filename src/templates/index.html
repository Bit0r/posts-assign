<!doctype html>
<html lang="zh">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport"
		content="width=device-width, initial-scale=1.0" />
	<title>Claim Comment</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/gardevoir" />
	<script
		src="https://challenges.cloudflare.com/turnstile/v0/api.js"
		async defer></script>
	<style>
		body {
			font-family:
				system-ui,
				-apple-system,
				sans-serif;
			background-color: #f3f4f6;
			display: grid;
			place-items: center;
			height: 100vh;
			margin: 0;
		}

		.card {
			display: grid;
			gap: 1rem;
			background: white;
			padding: 2rem;
			border-radius: 12px;
			box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
			width: 100%;
			max-width: 400px;
			box-sizing: border-box;
		}

		h1 {
			text-align: center;
			color: #1f2937;
			margin: 0;
			font-size: 1.5rem;
		}

		.error-msg {
			color: #dc2626;
			background-color: #fee2e2;
			padding: 0.75rem;
			border-radius: 6px;
			margin: 0;
			text-align: center;
			font-size: 0.9rem;
		}

		form {
			display: grid;
			gap: 1rem;
		}

		label {
			display: block;
			margin-bottom: 0.5rem;
			color: #374151;
			font-weight: 500;
		}

		input[type='text'] {
			width: 100%;
			padding: 0.75rem;
			border: 1px solid #d1d5db;
			border-radius: 6px;
			box-sizing: border-box;
			font-size: 1rem;
			margin: 0;
		}

		input[type='text']:focus {
			outline: none;
			border-color: #3b82f6;
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
		}

		.cf-turnstile {
			display: grid;
			justify-content: center;
		}

		button {
			width: 100%;
			padding: 0.75rem;
			background-color: #2563eb;
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: background-color 0.2s;
		}

		button:hover {
			background-color: #1d4ed8;
		}

		button:disabled {
			background-color: #9ca3af;
			cursor: not-allowed;
		}
	</style>
</head>

<body>
	<div class="card">
		<h1>Claim Comment</h1>

		{{ERROR_MSG}}

		<form method="POST" action="/claim">
			<label>
				Enter your Worker ID
				<input type="text" name="worker_id" required
					placeholder="e.g., 1234abcd" />
			</label>

			<div class="cf-turnstile"
				data-sitekey="{{TURNSTILE_SITE_KEY}}"></div>

			<button type="submit" {{DISABLED}}>Claim</button>
		</form>
	</div>
</body>

</html>
